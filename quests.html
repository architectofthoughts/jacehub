<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jacehub · 퀘스트</title>
  <link rel="stylesheet" href="quests.css" />
</head>
<body>
  <header class="q-header">
    <a class="q-back" href="index.html">← 허브</a>
    <h1>오늘의 퀘스트</h1>
    <div class="q-summary" id="summary">–</div>
  </header>

  <main class="q-main">
    <section id="needPin" class="q-card hidden">
      <p>PIN이 필요해요. 허브에서 보관소를 먼저 연결하세요.</p>
    </section>

    <section class="q-card">
      <h2>새 퀘스트</h2>
      <form id="addForm" class="q-form">
        <label class="q-field">
          <span class="q-label">앱</span>
          <select id="f_app" required></select>
        </label>

        <label class="q-field">
          <span class="q-label">행동</span>
          <select id="f_event"></select>
        </label>

        <label class="q-field q-field--full hidden" id="customEventField">
          <span class="q-label">직접 입력할 행동</span>
          <input id="f_event_custom" placeholder="예: workout_done" autocomplete="off" />
        </label>

        <label class="q-field q-field--full">
          <span class="q-label">제목</span>
          <input id="f_title" placeholder="퀘스트 이름을 정해주세요 (예: 매일 아침 의식)" required />
        </label>

        <label class="q-field">
          <span class="q-label">목표 횟수</span>
          <select id="f_target"></select>
        </label>

        <button type="submit" class="q-submit">추가</button>
      </form>
    </section>

    <div id="groups"></div>
  </main>

  <script src="quests.js"></script>
</body>
</html>
